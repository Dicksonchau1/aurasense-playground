<!--
AuraSense Platform — Mission Planner GCS
Single-file HTML, vanilla JS, Leaflet CDN, full simulation mode
All backend calls are simulated; works offline
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraSense Mission Planner GCS</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --primary: #14b8a6;
      --bg-dark: #181c20;
      --surface: #23272b;
      --text-primary: #f3f4f6;
      --border: #2d3237;
      --radius-md: 10px;
      --sidebar-width: 220px;
      --sidebar-width-mobile: 0px;
      --hud-width: 600px;
      --hud-height: 400px;
      --token-spacing: 16px;
      font-family: 'DM Sans', sans-serif;
    }
    body {
      margin: 0;
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    /* Sidebar */
    #sidebar {
      width: var(--sidebar-width);
      background: var(--surface);
      border-right: 1px solid var(--border);
      height: 100vh;
      position: fixed;
      top: 0; left: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      transition: width 0.2s;
    }
    #sidebar .logo {
      font-size: 1.5em;
      font-weight: bold;
      color: var(--primary);
      padding: 24px 0 16px 0;
      text-align: center;
      letter-spacing: 1px;
    }
    #sidebar nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 0 24px 0;
    }
    #sidebar nav a {
      color: var(--text-primary);
      text-decoration: none;
      padding: 12px 24px;
      border-radius: var(--radius-md);
      margin: 0 8px;
      font-size: 1.08em;
      transition: background 0.15s;
      display: block;
    }
    #sidebar nav a.active, #sidebar nav a:hover {
      background: var(--primary);
      color: #fff;
    }
    /* Main content */
    #main {
      margin-left: var(--sidebar-width);
      padding: 0;
      min-height: 100vh;
      background: var(--bg-dark);
      transition: margin-left 0.2s;
    }
    /* Tab switcher */
    #tab-switcher {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    #tab-switcher button {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 1.1em;
      padding: 18px 0;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: border 0.15s, background 0.15s;
    }
    #tab-switcher button.active {
      border-bottom: 3px solid var(--primary);
      color: var(--primary);
      background: #1a2227;
    }
    /* Responsive: mobile sidebar to bottom tab bar */
    @media (max-width: 768px) {
      #sidebar {
        width: var(--sidebar-width-mobile);
        min-width: 0;
        display: none;
      }
      #main {
        margin-left: 0;
      }
      #tab-switcher {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100vw;
        z-index: 100;
        border-bottom: none;
        border-top: 1px solid var(--border);
        background: var(--surface);
        height: 56px;
        box-shadow: 0 -2px 8px #0002;
      }
      #tab-switcher button {
        font-size: 1em;
        padding: 0;
        height: 56px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      #main-content {
        padding-bottom: 64px;
      }
    }
    /* ...existing code... (styles for each tab, HUD, map, wizards, etc.) */
  </style>
  <link href="https://fonts.googleapis.com/css?family=DM+Sans:400,500,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div id="sidebar">
    <div class="logo">AuraSense</div>
    <nav>
      <a href="#" class="active">Mission Planner</a>
      <a href="#">AuraRehearse</a>
      <a href="#">SFSVC</a>
      <a href="#">Fleet Console</a>
      <!-- ...other nav items... -->
    </nav>
  </div>
  <div id="main">
    <div id="tab-switcher">
      <button class="active" data-tab="flight-data">Flight Data</button>
      <button data-tab="flight-plan">Flight Plan</button>
      <button data-tab="initial-setup">Initial Setup</button>
      <button data-tab="config-tuning">Config / Tuning</button>
      <button data-tab="simulation">Simulation</button>
    </div>
    <div id="main-content">
      <!-- Tab panels will be injected here by JS -->
    </div>
  </div>
  <script>
    // ====== Tab Switching ======
    const tabs = [
      'flight-data',
      'flight-plan',
      'initial-setup',
      'config-tuning',
      'simulation'
    ];
    const tabButtons = document.querySelectorAll('#tab-switcher button');
    const mainContent = document.getElementById('main-content');
    let currentTab = 'flight-data';

    function switchTab(tab) {
      tabButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
      currentTab = tab;
      renderTab(tab);
    }
    tabButtons.forEach(btn => {
      btn.onclick = () => switchTab(btn.dataset.tab);
    });

    // ====== Tab Content Renderers ======
    function renderTab(tab) {
      if (tab === 'flight-data') renderFlightData();
      else if (tab === 'flight-plan') renderFlightPlan();
      else if (tab === 'initial-setup') renderInitialSetup();
      else if (tab === 'config-tuning') renderConfigTuning();
      else if (tab === 'simulation') renderSimulation();
    }

    // ====== CONFIG / TUNING TAB ======
    function renderConfigTuning() {
      mainContent.innerHTML = `<div style='padding:32px 0;'>
        <div id='config-tabs' style='display:flex;gap:0;margin-bottom:18px;'>
          <button class='config-tab active' data-tab='params'>Full Parameter List</button>
          <button class='config-tab' data-tab='pid'>PID Tuning</button>
          <button class='config-tab' data-tab='notch'>Notch Filter</button>
          <button class='config-tab' data-tab='logs'>Dataflash Logs</button>
        </div>
        <div id='config-content'></div>
      </div>`;
      document.querySelectorAll('.config-tab').forEach(btn => {
        btn.onclick = function() {
          document.querySelectorAll('.config-tab').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
          renderConfigPanel(btn.dataset.tab);
        };
      });
      renderConfigPanel('params');
    }
    function renderConfigPanel(tab) {
      const el = document.getElementById('config-content');
      if (!el) return;
      if (tab==='params') renderParamList(el);
      else if (tab==='pid') renderPidTuning(el);
      else if (tab==='notch') renderNotchFilter(el);
      else if (tab==='logs') renderDataflashLogs(el);
    }
    // Full Parameter List
    function renderParamList(el) {
      const params = [
        {name:'ARMING_CHECK',val:1,unit:'',opts:'0=Disabled,1=Enabled'},
        {name:'INS_ACCEL_FILTER',val:20,unit:'Hz',opts:'10/20/40'},
        {name:'ATC_RAT_RLL_P',val:0.135,unit:'',opts:'0-0.5'},
        {name:'ATC_RAT_PIT_P',val:0.135,unit:'',opts:'0-0.5'},
        {name:'ATC_RAT_YAW_P',val:0.18,unit:'',opts:'0-0.5'},
        {name:'BATT_CAPACITY',val:5200,unit:'mAh',opts:''},
        {name:'BATT_LOW_VOLT',val:10.5,unit:'V',opts:''},
        {name:'FS_THR_VALUE',val:950,unit:'',opts:''},
        {name:'GPS_HDOP_GOOD',val:1.2,unit:'',opts:''},
        {name:'EK2_ENABLE',val:1,unit:'',opts:'0=Off,1=On'},
        {name:'EK3_ENABLE',val:0,unit:'',opts:'0=Off,1=On'},
        {name:'RC1_MIN',val:1000,unit:'',opts:''},
        {name:'RC1_MAX',val:2000,unit:'',opts:''},
        {name:'RC1_TRIM',val:1500,unit:'',opts:''},
        {name:'RC2_MIN',val:1000,unit:'',opts:''},
        {name:'RC2_MAX',val:2000,unit:'',opts:''},
        {name:'RC2_TRIM',val:1500,unit:'',opts:''},
        {name:'RC3_MIN',val:1000,unit:'',opts:''},
        {name:'RC3_MAX',val:2000,unit:'',opts:''},
        {name:'RC3_TRIM',val:1500,unit:'',opts:''},
        {name:'RC4_MIN',val:1000,unit:'',opts:''},
        {name:'RC4_MAX',val:2000,unit:'',opts:''},
        {name:'RC4_TRIM',val:1500,unit:'',opts:''},
        {name:'RC5_MIN',val:1000,unit:'',opts:''},
        {name:'RC5_MAX',val:2000,unit:'',opts:''},
        {name:'RC5_TRIM',val:1500,unit:'',opts:''},
        {name:'RC6_MIN',val:1000,unit:'',opts:''},
        {name:'RC6_MAX',val:2000,unit:'',opts:''},
        {name:'RC6_TRIM',val:1500,unit:'',opts:''},
        {name:'RC7_MIN',val:1000,unit:'',opts:''},
        {name:'RC7_MAX',val:2000,unit:'',opts:''},
        {name:'RC7_TRIM',val:1500,unit:'',opts:''},
      ];
      let html = `<input id='param-search' placeholder='Search parameter...' style='width:220px;margin-bottom:8px;'>`;
      html += `<table style='width:100%;border-collapse:collapse;'><thead><tr style='background:#222;'><th>Parameter</th><th>Value</th><th>Unit</th><th>Options</th><th></th></tr></thead><tbody id='param-tbody'></tbody></table>`;
      el.innerHTML = html;
      function renderRows(filter='') {
        const tbody = document.getElementById('param-tbody');
        tbody.innerHTML = '';
        params.forEach((p,i) => {
          if (filter && !p.name.toLowerCase().includes(filter.toLowerCase())) return;
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${p.name}</td><td class='param-val' data-idx='${i}'>${p.val}</td><td>${p.unit}</td><td>${p.opts}</td><td><button class='param-write' data-idx='${i}' style='background:var(--primary);color:#fff;border:none;border-radius:4px;padding:2px 8px;'>Write to FC</button></td>`;
          tbody.appendChild(tr);
        });
        document.querySelectorAll('.param-val').forEach(cell => {
          cell.onclick = function() {
            const idx = +cell.dataset.idx;
            cell.innerHTML = `<input id='param-edit' type='text' value='${params[idx].val}' style='width:60px;'>`;
            const inp = document.getElementById('param-edit');
            inp.focus();
            inp.onblur = function() {
              params[idx].val = inp.value;
              renderRows(document.getElementById('param-search').value);
            };
          };
        });
        document.querySelectorAll('.param-write').forEach(btn => {
          btn.onclick = function() {
            const idx = +btn.dataset.idx;
            const ta = document.getElementById('mavlink-console');
            if (ta) {
              ta.value += `\n[FC] Write param ${params[idx].name}=${params[idx].val}`;
              ta.scrollTop = ta.scrollHeight;
            }
          };
        });
      }
      renderRows();
      document.getElementById('param-search').oninput = function() {
        renderRows(this.value);
      };
    }
    // PID Tuning
    function renderPidTuning(el) {
      let axes = ['Roll','Pitch','Yaw'];
      let pids = axes.map(()=>({P:0.135,I:0.09,D:0.003}));
      let html = '';
      axes.forEach((ax,i)=>{
        html += `<div style='margin-bottom:18px;'><b>${ax}</b><br>
          P: <input type='range' min='0' max='0.5' step='0.001' value='${pids[i].P}' id='pid-p${i}' style='width:120px;'> <span id='pid-pv${i}'>${pids[i].P}</span>
          I: <input type='range' min='0' max='0.5' step='0.001' value='${pids[i].I}' id='pid-i${i}' style='width:120px;'> <span id='pid-iv${i}'>${pids[i].I}</span>
          D: <input type='range' min='0' max='0.5' step='0.001' value='${pids[i].D}' id='pid-d${i}' style='width:120px;'> <span id='pid-dv${i}'>${pids[i].D}</span>
        </div>`;
      });
      html += `<button id='write-pids' style='background:var(--primary);color:#fff;border:none;border-radius:6px;padding:8px 24px;font-weight:600;'>Write PIDs</button>`;
      el.innerHTML = html;
      axes.forEach((ax,i)=>{
        ['p','i','d'].forEach((k,ki)=>{
          document.getElementById(`pid-${k}${i}`).oninput = function() {
            pids[i][k.toUpperCase()] = +this.value;
            document.getElementById(`pid-${k}v${i}`).textContent = this.value;
          };
        });
      });
      document.getElementById('write-pids').onclick = function() {
        const ta = document.getElementById('mavlink-console');
        if (ta) {
          ta.value += '\n[FC] Write PIDs: ' + JSON.stringify(pids);
          ta.scrollTop = ta.scrollHeight;
        }
      };
    }
    // Notch Filter
    function renderNotchFilter(el) {
      el.innerHTML = `<div><b>Notch Filter</b></div>
        <div>Enable: <input type='checkbox' id='notch-enable'></div>
        <div>Center Freq (Hz): <input type='range' min='20' max='200' value='80' id='notch-freq'> <span id='notch-freqv'>80</span></div>
        <div>Bandwidth (Hz): <input type='range' min='5' max='50' value='20' id='notch-bw'> <span id='notch-bwv'>20</span></div>
        <div>Attenuation (dB): <input type='range' min='1' max='40' value='10' id='notch-att'> <span id='notch-attv'>10</span></div>
        <button id='apply-notch' style='background:var(--primary);color:#fff;border:none;border-radius:6px;padding:8px 24px;font-weight:600;'>Apply</button>`;
      ['freq','bw','att'].forEach(k=>{
        document.getElementById('notch-'+k).oninput = function() {
          document.getElementById('notch-'+k+'v').textContent = this.value;
        };
      });
      document.getElementById('apply-notch').onclick = function() {
        const ta = document.getElementById('mavlink-console');
        if (ta) {
          ta.value += '\n[FC] Notch filter applied.';
          ta.scrollTop = ta.scrollHeight;
        }
      };
    }
    // Dataflash Logs
    function renderDataflashLogs(el) {
      let logs = [
        {num:1,date:'2026-05-10',size:'2.1MB'},
        {num:2,date:'2026-05-11',size:'1.8MB'},
        {num:3,date:'2026-05-12',size:'2.4MB'}
      ];
      let html = `<table style='width:100%;border-collapse:collapse;'><thead><tr style='background:#222;'><th>#</th><th>Date</th><th>Size</th><th></th></tr></thead><tbody>`;
      logs.forEach(l=>{
        html += `<tr><td>${l.num}</td><td>${l.date}</td><td>${l.size}</td><td><button class='log-dl' data-num='${l.num}' style='background:var(--primary);color:#fff;border:none;border-radius:4px;padding:2px 8px;'>Download</button></td></tr>`;
      });
      html += '</tbody></table>';
      el.innerHTML = html;
      document.querySelectorAll('.log-dl').forEach(btn => {
        btn.onclick = function() {
          const blob = new Blob(['dummy log data'], {type:'application/octet-stream'});
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = `log${btn.dataset.num}.bin`;
          a.click();
          setTimeout(()=>URL.revokeObjectURL(url),1000);
        };
      });
    }

    // ====== SIMULATION TAB ======
    function renderSimulation() {
      mainContent.innerHTML = `<div style='padding:32px 0;max-width:600px;margin:auto;'>
        <div><b>SITL Launcher</b></div>
        <div style='margin:12px 0;'>
          Vehicle type: <select id='sim-veh'><option>Copter</option><option>Plane</option><option>Rover</option><option>Sub</option></select>
          Frame: <select id='sim-frame'><option>quad</option><option>hexa</option><option>octo</option><option>Y6</option><option>X8</option></select>
        </div>
        <div style='margin:12px 0;'>
          Wind speed (m/s): <input id='sim-wind' type='number' value='0' style='width:60px;'>
          Wind direction (°): <input id='sim-winddir' type='number' value='0' style='width:60px;'>
        </div>
        <button id='launch-sitl' style='background:var(--primary);color:#fff;border:none;border-radius:6px;padding:8px 24px;font-weight:600;'>Launch SITL</button>
        <button id='connect-udp' style='background:#2196f3;color:#fff;border:none;border-radius:6px;padding:8px 24px;font-weight:600;margin-left:12px;'>Connect via UDP:14550</button>
        <div id='sim-conn-badge' style='margin:12px 0;display:inline-block;'></div>
        <pre id='sitl-console' style='background:#111;color:#0ff;padding:12px 8px;border-radius:8px;height:180px;overflow:auto;margin-top:12px;'></pre>
      </div>`;
      document.getElementById('launch-sitl').onclick = function() {
        const pre = document.getElementById('sitl-console');
        pre.textContent = '';
        const lines = [
          'Starting ArduCopter SITL...','Frame: quad-x','bind port 14550 for MAVLink','ArduCopter V4.5.7 (dev)','Waiting for connection...','Connection from 127.0.0.1:14550'
        ];
        let i=0;
        function typeLine() {
          if (i<lines.length) {
            pre.textContent += lines[i]+"\n";
            i++;
            setTimeout(typeLine, 700);
          }
        }
        typeLine();
      };
      document.getElementById('connect-udp').onclick = function() {
        document.getElementById('sim-conn-badge').innerHTML = `<span style='color:#14b8a6;font-weight:700;'>● Connected</span>`;
      };
    }
    }

    // ====== FLIGHT DATA TAB ======
    function renderFlightData() {
      mainContent.innerHTML = `
        <div style="display:flex;flex-wrap:wrap;gap:32px;align-items:flex-start;justify-content:center;padding:32px 0;">
          <div style="flex:1 1 60%;max-width:620px;min-width:320px;">
            <canvas id="hud-canvas" width="600" height="400" style="width:100%;max-width:600px;background:#181c20;border-radius:var(--radius-md);box-shadow:0 2px 16px #0004;"></canvas>
            <div id="hud-statusbar" style="margin-top:8px;display:flex;gap:24px;align-items:center;justify-content:center;font-size:1.1em;"></div>
          </div>
          <div style="flex:1 1 340px;max-width:420px;min-width:260px;background:var(--surface);border-radius:var(--radius-md);padding:24px 18px;box-shadow:0 2px 12px #0002;">
            <div class="telemetry-section">
              <details open>
                <summary>Attitude</summary>
                <div>Roll: <span id="att-roll">0</span>°</div>
                <div>Pitch: <span id="att-pitch">0</span>°</div>
                <div>Yaw: <span id="att-yaw">0</span>°</div>
              </details>
              <details open>
                <summary>GPS</summary>
                <div>Lat: <span id="gps-lat">0</span></div>
                <div>Lon: <span id="gps-lon">0</span></div>
                <div>Alt: <span id="gps-alt">0</span> m</div>
                <div>Fix: <span id="gps-fix">3D</span></div>
                <div>Sats: <span id="gps-sats">12</span></div>
                <div>HDOP: <span id="gps-hdop">0.8</span></div>
              </details>
              <details open>
                <summary>Battery</summary>
                <div>Voltage: <span id="bat-voltage">16.2</span> V</div>
                <div>Current: <span id="bat-current">2.1</span> A</div>
                <div>Remaining: <span id="bat-remain">98</span>%</div>
              </details>
            </div>
            <div style="display:flex;gap:12px;margin:18px 0;">
              <button id="btn-arm" style="flex:1;background:#16c784;color:#fff;font-weight:600;padding:10px 0;border:none;border-radius:6px;">ARM</button>
              <button id="btn-disarm" style="flex:1;background:#e74c3c;color:#fff;font-weight:600;padding:10px 0;border:none;border-radius:6px;">DISARM</button>
            </div>
            <div style="margin-top:12px;">
              <label style="font-weight:600;">MAVLink Console</label>
              <textarea id="mavlink-console" readonly style="width:100%;height:90px;background:#111;color:#0ff;font-family:monospace;font-size:1em;border-radius:6px;margin-top:4px;resize:none;overflow:auto;"></textarea>
              <div style="display:flex;gap:8px;margin-top:4px;">
                <input id="mavlink-cmd" style="flex:1;background:#23272b;color:#fff;border:1px solid #333;border-radius:6px;padding:6px 8px;font-family:monospace;" placeholder="MAVLink command...">
                <button id="mavlink-send" style="background:var(--primary);color:#fff;border:none;border-radius:6px;padding:6px 18px;font-weight:600;">Send</button>
              </div>
            </div>
          </div>
        </div>
      `;
      startHudSimulation();
      setupMavlinkConsole();
    }

    // ====== HUD Simulation ======
    let hudSimIntv = null;
    function startHudSimulation() {
      if (hudSimIntv) clearInterval(hudSimIntv);
      const canvas = document.getElementById('hud-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let t = 0;
      hudSimIntv = setInterval(() => {
        t += 0.1;
        // Simulate values
        const pitch = Math.sin(t/2)*15;
        const roll = Math.sin(t/1.7)*20;
        const yaw = (t*18)%360;
        const alt = 60 + Math.sin(t/1.3)*60;
        const spd = 7.5 + Math.sin(t/1.1)*7.5;
        drawHud(ctx, pitch, roll, yaw, alt, spd);
        // Update telemetry
        document.getElementById('att-roll').textContent = roll.toFixed(1);
        document.getElementById('att-pitch').textContent = pitch.toFixed(1);
        document.getElementById('att-yaw').textContent = yaw.toFixed(1);
        document.getElementById('gps-lat').textContent = (22.3193 + Math.sin(t/10)*0.0005).toFixed(6);
        document.getElementById('gps-lon').textContent = (114.2260 + Math.cos(t/10)*0.0005).toFixed(6);
        document.getElementById('gps-alt').textContent = (alt+2).toFixed(1);
        document.getElementById('gps-fix').textContent = '3D';
        document.getElementById('gps-sats').textContent = '12';
        document.getElementById('gps-hdop').textContent = '0.8';
        document.getElementById('bat-voltage').textContent = (16.2 - t*0.001).toFixed(2);
        document.getElementById('bat-current').textContent = (2.1 + Math.abs(Math.sin(t/2))*0.5).toFixed(2);
        document.getElementById('bat-remain').textContent = (98 - t*0.02).toFixed(1);
        // Status bar
        document.getElementById('hud-statusbar').innerHTML = `
          <span>📡 <b>GPS</b> 12 sats</span>
          <span>🔋 <b>${(16.2-t*0.001).toFixed(2)}V</b> (${(98-t*0.02).toFixed(1)}%)</span>
          <span style="background:#222;padding:2px 10px;border-radius:8px;">STABILIZE</span>
          <span>📍 <b>32.1m</b> to WP</span>
        `;
      }, 100);
    }

    function drawHud(ctx, pitch, roll, yaw, alt, spd) {
      ctx.clearRect(0,0,600,400);
      // Artificial horizon
      ctx.save();
      ctx.translate(300,200);
      ctx.rotate(-roll*Math.PI/180);
      // Sky
      ctx.fillStyle = '#1e3a5c';
      ctx.fillRect(-400,-400,800,400+pitch*3);
      // Ground
      ctx.fillStyle = '#6b3e1e';
      ctx.fillRect(-400,pitch*3,800,400-pitch*3);
      // Pitch ladder
      ctx.strokeStyle = '#fff8';
      ctx.lineWidth = 2;
      for(let p=-90;p<=90;p+=10){
        if(p===0) continue;
        ctx.beginPath();
        ctx.moveTo(-40,p*3-pitch*3);
        ctx.lineTo(40,p*3-pitch*3);
        ctx.stroke();
        ctx.font = '12px DM Sans';
        ctx.fillStyle = '#fff';
        ctx.fillText(p,45,p*3-pitch*3+4);
        ctx.fillText(p,-60,p*3-pitch*3+4);
      }
      // Center crosshair
      ctx.strokeStyle = '#0ff';
      ctx.beginPath();ctx.moveTo(-12,0);ctx.lineTo(12,0);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(0,12);ctx.stroke();
      ctx.restore();
      // Roll arc
      ctx.save();
      ctx.translate(300,200);
      ctx.strokeStyle = '#fff';
      ctx.beginPath();ctx.arc(0,0,120,Math.PI,2*Math.PI);ctx.stroke();
      for(let r=-60;r<=60;r+=15){
        let rad = (r-90)*Math.PI/180;
        let x = 120*Math.cos(rad), y = 120*Math.sin(rad);
        ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x*0.92,y*0.92);ctx.stroke();
      }
      ctx.restore();
      // Heading tape
      ctx.save();
      ctx.translate(300,40);
      ctx.fillStyle = '#222';
      ctx.fillRect(-180,-18,360,36);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.beginPath();ctx.moveTo(-180,0);ctx.lineTo(180,0);ctx.stroke();
      for(let h=0;h<360;h+=30){
        let x = ((h-yaw+360)%360-180)*1.5;
        if(x<-180||x>180) continue;
        ctx.beginPath();ctx.moveTo(x,-12);ctx.lineTo(x,12);ctx.stroke();
        ctx.font = '13px DM Sans';
        ctx.fillStyle = '#fff';
        ctx.fillText(h,x-12,18);
      }
      ctx.restore();
      // Altitude ladder (right)
      ctx.save();
      ctx.translate(590,200);
      ctx.fillStyle = '#222';
      ctx.fillRect(-30,-120,36,240);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      for(let a=-60;a<=60;a+=20){
        let val = Math.round(alt+a);
        let y = a*2;
        ctx.beginPath();ctx.moveTo(-24,y);ctx.lineTo(0,y);ctx.stroke();
        ctx.font = '12px DM Sans';
        ctx.fillStyle = '#fff';
        ctx.fillText(val,2,y+4);
      }
      ctx.restore();
      // Airspeed ladder (left)
      ctx.save();
      ctx.translate(10,200);
      ctx.fillStyle = '#222';
      ctx.fillRect(-6,-120,36,240);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      for(let s=-7;s<=7;s+=2){
        let val = Math.round(spd+s);
        let y = s*12;
        ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(24,y);ctx.stroke();
        ctx.font = '12px DM Sans';
        ctx.fillStyle = '#fff';
        ctx.fillText(val,26,y+4);
      }
      ctx.restore();
    }

    // ====== Leaflet Map & Waypoints ======
    let map, wpMarkers = [], wpData = [];
    function initMap() {
      if (map) { map.remove(); map = null; }
      map = L.map('map-canvas').setView([22.3193, 114.2260], 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
      }).addTo(map);
      map.on('click', function(e) {
        addWaypoint(e.latlng.lat, e.latlng.lng);
      });
      wpMarkers = [];
      wpData = [];
      renderWpTable();
    }
    function addWaypoint(lat, lon) {
      const idx = wpData.length+1;
      const marker = L.marker([lat, lon], {
        icon: L.divIcon({
          className: 'wp-pin',
          html: `<div style=\"background:#2196f3;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1em;border:2px solid #fff;box-shadow:0 2px 8px #0003;\">${idx}</div>`
        })
      }).addTo(map);
      wpMarkers.push(marker);
      wpData.push({seq:idx,cmd:'WAYPOINT',alt:30,lat:lat.toFixed(6),lon:lon.toFixed(6),spd:5});
      renderWpTable();
    }
    function renderWpTable() {
      const tbody = document.querySelector('#wp-table tbody');
      if (!tbody) return;
      tbody.innerHTML = '';
      wpData.forEach((wp,i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${i+1}</td>
          <td><select data-idx="${i}" class="wp-cmd">
            <option>WAYPOINT</option><option>RTL</option><option>LAND</option><option>TAKEOFF</option>
          </select></td>
          <td><input type="number" value="${wp.alt}" data-idx="${i}" class="wp-alt" style="width:48px;"></td>
          <td><input type="number" value="${wp.lat}" data-idx="${i}" class="wp-lat" style="width:90px;"></td>
          <td><input type="number" value="${wp.lon}" data-idx="${i}" class="wp-lon" style="width:90px;"></td>
          <td><input type="number" value="${wp.spd}" data-idx="${i}" class="wp-spd" style="width:48px;"></td>
          <td><button data-idx="${i}" class="wp-del" style="background:#e74c3c;color:#fff;border:none;border-radius:4px;padding:2px 8px;">✕</button></td>
        `;
        tbody.appendChild(tr);
      });
      // Wire up events
      tbody.querySelectorAll('.wp-del').forEach(btn => {
        btn.onclick = e => {
          const idx = +btn.dataset.idx;
          wpMarkers[idx].remove();
          wpMarkers.splice(idx,1);
          wpData.splice(idx,1);
          renderWpTable();
        };
      });
      tbody.querySelectorAll('.wp-cmd').forEach(sel => {
        sel.value = wpData[+sel.dataset.idx].cmd;
        sel.onchange = () => { wpData[+sel.dataset.idx].cmd = sel.value; };
      });
      tbody.querySelectorAll('.wp-alt').forEach(inp => {
        inp.onchange = () => { wpData[+inp.dataset.idx].alt = +inp.value; };
      });
      tbody.querySelectorAll('.wp-lat').forEach(inp => {
        inp.onchange = () => { wpData[+inp.dataset.idx].lat = +inp.value; };
      });
      tbody.querySelectorAll('.wp-lon').forEach(inp => {
        inp.onchange = () => { wpData[+inp.dataset.idx].lon = +inp.value; };
      });
      tbody.querySelectorAll('.wp-spd').forEach(inp => {
        inp.onchange = () => { wpData[+inp.dataset.idx].spd = +inp.value; };
      });
    }

    // ====== Radio Calibration Panel ======
    function renderRadioCal(el) {
      el.innerHTML = `<div><b>Radio Calibration</b></div>
        <div id="radio-bars" style="margin:16px 0 8px 0;"></div>
        <button id="btn-radio-cal" style="background:var(--primary);color:#fff;border:none;border-radius:6px;padding:8px 24px;font-weight:600;">Calibrate Radio</button>
        <div id="radio-progress" style="margin:8px 0;"></div>
        <div id="radio-table"></div>`;
      const bars = [
        'CH1 Roll','CH2 Pitch','CH3 Throttle','CH4 Yaw',
        'CH5 AUX1','CH6 AUX2','CH7 AUX3','CH8 AUX4'
      ];
      let minmax = bars.map(()=>({min:1000,max:2000,trim:1500,reversed:false}));
      let vals = bars.map(()=>1500);
      function drawBars() {
        let html = '';
        for(let i=0;i<8;i++) {
          html += `<div style='margin:6px 0;'>${bars[i]} <input type='checkbox' id='rev${i}'> Reversed? <div style='display:inline-block;width:220px;height:18px;background:#222;border-radius:8px;vertical-align:middle;position:relative;'><div style='position:absolute;left:${(vals[i]-1000)/1000*200}px;top:0;width:8px;height:18px;background:#14b8a6;border-radius:4px;'></div></div></div>`;
        }
        document.getElementById('radio-bars').innerHTML = html;
      }
      drawBars();
      document.getElementById('btn-radio-cal').onclick = function() {
        let t = 0, duration = 30, intv;
        document.getElementById('radio-progress').innerHTML = `<progress value='0' max='${duration}'></progress>`;
        intv = setInterval(()=>{
          t++;
          for(let i=0;i<8;i++) {
            vals[i] = 1500 + Math.sin((t+i)*0.2)*400;
            minmax[i].min = Math.min(minmax[i].min,vals[i]);
            minmax[i].max = Math.max(minmax[i].max,vals[i]);
            minmax[i].trim = Math.round((minmax[i].min+minmax[i].max)/2);
          }
          drawBars();
          document.querySelector('#radio-progress progress').value = t;
          if (t>=duration) {
            clearInterval(intv);
            let table = `<table style='width:100%;margin-top:8px;'><tr><th>Channel</th><th>Min</th><th>Max</th><th>Trim</th></tr>`;
            for(let i=0;i<8;i++) table += `<tr><td>${bars[i]}</td><td>${minmax[i].min|0}</td><td>${minmax[i].max|0}</td><td>${minmax[i].trim|0}</td></tr>`;
            table += '</table>';
            document.getElementById('radio-table').innerHTML = table;
          }
        }, 1000);
      };
    }
