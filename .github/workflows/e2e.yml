name: E2E
on: [pull_request]
jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @aurasense/www exec playwright install --with-deps chromium
      - run: pnpm --filter @aurasense/www test:e2e
        env:
          MOCK_NEPA: "1"
