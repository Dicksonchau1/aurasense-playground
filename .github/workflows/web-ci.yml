name: Web CI

on:
  push:
    paths:
      - 'apps/web/**'
      - 'scripts/**'
      - 'public/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'scripts/**'
      - 'public/**'
      - '.github/workflows/web-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Build Next.js app
        run: pnpm build
      - name: Run Playwright install
        run: pnpm exec playwright install --with-deps
      - name: Run Playwright E2E tests
        run: pnpm exec playwright test
      - name: Generate PDFs and OG images
        run: |
          pnpm tsx ../../scripts/generate-pitch-brief.ts 11111111-1111-1111-1111-111111111111 --out out/icc-brief.pdf --api http://localhost:8000/v1
          pnpm exec playwright test --project=snapshots
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-artifacts
          path: |
            apps/web/out/*.pdf
            apps/web/public/og/*.png
